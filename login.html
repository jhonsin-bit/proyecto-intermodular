<!-- Lo básico en cualquier proyecto web. Declaramos qué versión de html estamos usando. -->
<!DOCTYPE html>
<!-- En lang declaramos 'es' porque la web principal es española -->
<html lang="es">
<head>
    <!-- Configuración para leer acentos y símbolos sin que salgan símbolos raros, clave para el español -->
    <meta charset="UTF-8">
    <!-- Super importante para que el móvil no nos rompa la vista de la web, ajustando el contenido a su pantallita táctil -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Este es el título que lees arriba en las pestañas de chrome -->
    <title>Acceso del Sistema - EcoDigital Audit</title>
    <!-- Tráfico externo llamando a las google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Llamando a nuestro mega archivo de estética css que configuramos de antes -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <!-- Aquí armo el Header, que es básicamente el menú de arriba. Le doy mi clase .navbar para el efecto cristal del css -->
    <header class="navbar">
        <!-- Bloquecito contenedor para colocar nuestro logo apartado a la izquierda -->
        <div class="logo-container">
            <a href="index.html" class="logo-text">EcoDigital Audit</a>
        </div>
        <!-- Un clásico nav con su 'lista' (ul) para separar todos los botones que llevan a otras partes de la página -->
        <nav>
            <ul class="nav-links">
                <!-- Usando li e hiperenlaces (a href) para mapear todo nuestro index de grado -->
                <li><a href="index.html">Inicio</a></li>
                <li><a href="sobre_nosotros.html">Misión y Visión</a></li>
                <li><a href="sugerencias.html">Sugerencias</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
        <!-- Una caja de la derecha reservada por si hay clicks o cuentas abiertas -->
        <div class="nav-actions">
            <!-- Botoncito coloreado de redirigida a Login. Usamos las clases preestablecidas de btn-primary -->
            <a href="login.html" class="btn btn-primary">Acceder</a>
        </div>
    </header>

    <!-- La caja main gigante sirve para aislar tu parte real y de lectura del resto de basura base -->
    <!-- login-main es una clase mía del css para tirar todo al medio exacto en display flex central vertical -->
    <main class="login-main">
        <!-- Contenedor general en blanco, como formato tarjeta de visita max-w-400 para que se quede cuadradita y pequeña y no un churro estirado horizontal -->
        <div class="card-container max-w-400 reveal login-card">
            <h2 class="text-center text-primary mb-2">Iniciar Sesión</h2>
            
            <!-- Aquí el bloque rey: el formulario html con una id. No usamos target php ni method = POST porque es puro local js front -->
            <form id="login-form">
                
                <!-- Un empaquetado div simplemente para dar un margin-bottom en un grupito a la etiqueta label y al input sin enloquecer -->
                <div class="form-group">
                    <label for="email">Credencial ID (Email)</label>
                    <input type="email" id="email" class="form-control" autocomplete="off" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password de Encriptación ISO</label>
                    <!-- Type=password lo que hace base es cubrirte tus letritas por bolitas de negro o estrellitas en mac por puro visual -->
                    <input type="password" id="password" class="form-control" required>
                </div>
                
                <!-- Ojo, este paragrafo inicia desactivado de vista por clase en el css oculto error-msg, solo lo activo con true si desde JS me mandan un fallo de login! -->
                <p id="error-msg" class="error-msg">Error: Acceso denegado, IP Registrada e incautada.</p>
                
                <!-- Al poner tipo submit forzamos la recogida del botón verde general -->
                <button type="submit" class="btn btn-primary w-100">Entrar al Sistema</button>
            </form>
        </div>
    </main>

    <!-- El footer humilde por puro rigor de semántica HTML5 -->
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 EcoDigital Audit. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Aquí el script base de navs -->
    <script src="js/main.js"></script>
    <!-- Inyectamos nuestra escasa logica de falsado del input en index cargándola directamente del disco de nuestra carpeta javascript -->
    <script src="js/login.js"></script>
</body>
</html>
